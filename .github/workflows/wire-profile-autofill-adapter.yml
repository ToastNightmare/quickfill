name: Wire profile autofill adapter

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/wire-profile-autofill-adapter.yml

permissions:
  contents: write

jobs:
  wire-autofill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wire autofill buttons
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          def replace_block(text: str, start: str, end: str, replacement: str) -> str:
              start_index = text.find(start)
              if start_index == -1:
                  raise SystemExit(f"Missing start marker: {start}")
              end_index = text.find(end, start_index)
              if end_index == -1:
                  raise SystemExit(f"Missing end marker after {start}: {end}")
              return text[:start_index] + replacement + text[end_index:]

          mobile_path = Path("src/components/MobileFiller.tsx")
          mobile = mobile_path.read_text()
          if "@/lib/profile-autofill" not in mobile:
              mobile = mobile.replace(
                  'import { SignatureModal } from "@/components/SignatureModal";\n',
                  'import { SignatureModal } from "@/components/SignatureModal";\n'
                  'import { trackAutofillShadowReport } from "@/lib/autofill-shadow-reporting";\n'
                  'import { autofillModeFromFlag, runProfileAutofill } from "@/lib/profile-autofill";\n',
              )
          mobile_replacement = '''  const handleAutoFill = useCallback(async () => {
    try {
      const res = await fetch("/api/profile");
      if (!res.ok) { showToast("Sign in and save your profile first"); return; }
      const profile = await res.json();
      if (!profile?.fullName) { showToast("No profile saved, go to Profile to set one up"); return; }

      const mode = autofillModeFromFlag(process.env.NEXT_PUBLIC_QUICKFILL_AUTOFILL_MODE);
      const result = runProfileAutofill(fields, profile, mode);
      setFields(result.fields);
      trackAutofillShadowReport(result, { surface: "mobile", hasAcroForm });
      showToast(result.matched > 0 ? `Auto-filled ${result.matched} field${result.matched > 1 ? "s" : ""}` : "No matching fields found");
    } catch {
      showToast("Failed to load profile");
    }
  }, [fields, hasAcroForm, showToast]);
'''
          mobile = replace_block(mobile, "  const handleAutoFill = useCallback(async () => {", "\n\n  // ── Signature", mobile_replacement)
          mobile_path.write_text(mobile)

          editor_path = Path("src/app/editor/page.tsx")
          editor = editor_path.read_text()
          if "@/lib/profile-autofill" not in editor:
              editor = editor.replace(
                  'import { trackEvent } from "@/lib/analytics";\n',
                  'import { trackEvent } from "@/lib/analytics";\n'
                  'import { trackAutofillShadowReport } from "@/lib/autofill-shadow-reporting";\n'
                  'import { autofillModeFromFlag, runProfileAutofill } from "@/lib/profile-autofill";\n',
              )
          editor_replacement = '''  const handleAutoFillFromProfile = useCallback(async () => {
    try {
      const res = await fetch("/api/profile");
      if (!res.ok) {
        showToast("Sign in and save your profile first");
        return;
      }
      const profile = await res.json();
      if (!profile?.fullName) {
        showToast("No profile saved, go to Profile to set one up");
        return;
      }

      const mode = autofillModeFromFlag(process.env.NEXT_PUBLIC_QUICKFILL_AUTOFILL_MODE);
      const result = runProfileAutofill(fields, profile, mode);
      setFields(result.fields);
      trackAutofillShadowReport(result, {
        surface: "desktop",
        hasAcroForm,
        totalPages,
      });
      showToast(result.matched > 0 ? `Auto-filled ${result.matched} field${result.matched > 1 ? "s" : ""}` : "No matching profile fields found");
    } catch {
      showToast("Failed to load profile");
    }
  }, [fields, hasAcroForm, setFields, showToast, totalPages]);
'''
          editor = replace_block(editor, "  const handleAutoFillFromProfile = useCallback(async () => {", "\n\n  const handleDetectFields", editor_replacement)
          editor_path.write_text(editor)

          helper_path = Path("src/lib/profile-autofill.ts")
          helper = helper_path.read_text()
          if "type AutofillFieldType" not in helper:
              helper = helper.replace(
                  "  type AutofillFieldCandidate,\n",
                  "  type AutofillFieldCandidate,\n  type AutofillFieldType,\n",
              )
          helper = helper.replace(
              '  type: "text" | "checkbox" | "signature" | "date" | "comb";\n',
              '  type: AutofillFieldType | "whiteout";\n',
          )
          if "function isAutofillCandidateField" not in helper:
              helper = helper.replace(
                  "function toCandidate(field: ProfileAutofillField): AutofillFieldCandidate {\n",
                  "function isAutofillCandidateField(field: ProfileAutofillField): field is ProfileAutofillField & { type: AutofillFieldType } {\n"
                  "  return field.type !== \"whiteout\";\n"
                  "}\n\n"
                  "function toCandidate(field: ProfileAutofillField & { type: AutofillFieldType }): AutofillFieldCandidate {\n",
              )
          helper = helper.replace(
              "  const candidates = fields.map(toCandidate);\n  const predictions = predictAutofillFields(candidates, profile);\n",
              "  const candidateFields = fields.filter(isAutofillCandidateField);\n  const candidates = candidateFields.map(toCandidate);\n  const predictions = predictAutofillFields(candidates, profile);\n",
          )
          helper = helper.replace(
              "    const next = applyAutofillPredictions(fields, profile, predictions, \"auto-fill\");\n    const matched = next.filter((field, index) => field.value !== fields[index]?.value).length;\n",
              "    const intelligentFields = applyAutofillPredictions(candidateFields, profile, predictions, \"auto-fill\");\n    const intelligentFieldsById = new Map(intelligentFields.map((field) => [field.id, field]));\n    const next = fields.map((field) => (intelligentFieldsById.get(field.id) as T | undefined) ?? field);\n    const previousValuesById = new Map(fields.map((field) => [field.id, field.value]));\n    const matched = next.filter((field) => field.value !== previousValuesById.get(field.id)).length;\n",
          )
          helper_path.write_text(helper)

          subprocess.run(["git", "config", "user.name", "QuickFill Automation"], check=True)
          subprocess.run(["git", "config", "user.email", "actions@github.com"], check=True)
          subprocess.run(["git", "add", "src/components/MobileFiller.tsx", "src/app/editor/page.tsx", "src/lib/profile-autofill.ts"], check=True)
          status = subprocess.run(["git", "status", "--porcelain"], check=True, capture_output=True, text=True)
          if not status.stdout.strip():
              print("No changes needed")
              raise SystemExit(0)
          subprocess.run(["git", "commit", "-m", "Wire profile autofill buttons to rollout mode"], check=True)
          subprocess.run(["git", "push"], check=True)
