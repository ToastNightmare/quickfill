name: QuickFill CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verification:
    name: Build, Jest, and standard Playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Validate required Clerk development credentials
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.QUICKFILL_CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.QUICKFILL_CI_CLERK_SECRET_KEY }}
        run: |
          missing=0

          if [[ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]]; then
            echo "::error::Required repository Actions secret QUICKFILL_CI_CLERK_PUBLISHABLE_KEY is unavailable."
            missing=1
          fi

          if [[ -z "${CLERK_SECRET_KEY:-}" ]]; then
            echo "::error::Required repository Actions secret QUICKFILL_CI_CLERK_SECRET_KEY is unavailable."
            missing=1
          fi

          exit "${missing}"

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Enable the repository-pinned pnpm version
        run: |
          corepack enable
          corepack install

      - name: Resolve the pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "${GITHUB_OUTPUT}"

      - name: Restore the pnpm store
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node-22-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium and system dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production application
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.QUICKFILL_CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.QUICKFILL_CI_CLERK_SECRET_KEY }}
        run: pnpm build

      - name: Run full Jest suite
        run: pnpm exec jest --passWithNoTests

      - name: Run standard localhost Playwright suite
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.QUICKFILL_CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.QUICKFILL_CI_CLERK_SECRET_KEY }}
          QUICKFILL_STANDARD_QA: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          TMPDIR: /tmp
          TMP: /tmp
          TEMP: /tmp
        run: pnpm exec playwright test --reporter=list

      - name: Run PDF accuracy pack against localhost
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.QUICKFILL_CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.QUICKFILL_CI_CLERK_SECRET_KEY }}
          QUICKFILL_PDF_QA_ENFORCE: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          UPSTASH_REDIS_REST_URL: http://127.0.0.1:38079
          TMPDIR: /tmp
          TMP: /tmp
          TEMP: /tmp
        run: |
          pdf_qa_token="$(node -e 'process.stdout.write(require("node:crypto").randomBytes(32).toString("base64url"))')"
          printf '::add-mask::%s\n' "${pdf_qa_token}"
          QUICKFILL_QA_TOKEN="${pdf_qa_token}" UPSTASH_REDIS_REST_TOKEN="${pdf_qa_token}" pnpm qa:pdf

      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quickfill-playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/quickfill-playwright-*
          if-no-files-found: ignore
          retention-days: 7
